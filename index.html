<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

</head>

<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <img src="img/Logo.svg" alt="Logo">
      </div>
      <div class="btn-menu">
        <div class="btn-menu__line"></div>
        <div class="btn-menu__line"></div>
        <div class="btn-menu__line"></div>
      </div>
      <nav class="nav">
        <ul class="nav-list">
          <li><a class="nav-list__link" href="#product">Product</a></li>
          <li><a class="nav-list__link" href="#customers">Customers</a></li>
          <li><a class="nav-list__link" href="#pricing">Pricing</a></li>
          <li><a class="nav-list__link" href="#resources">Resources</a></li>
        </ul>
        <div class="nav-buttons">
          <div class="btn btn--sm btn-outline">
            Log In
          </div>
          <br>
          <div class="btn btn--sm">
            Sign Up
          </div>
        </div>
      </nav>
    </header>
  </div>

  <section class="hero">
    <div class="container">
      <div class="hero__content">
        <div class="hero__descr">
          <h1>
            The Design Thinking superpowers
          </h1>
          <p>Tools, tutorials, design and innovation experts, all in one place! The most intuitive way to imagine your next user experience.</p>
          <button class="btn btn--md" type="button">Get started</button>
        </div>
        <div  class="hero__img">
          <img src="img/Image.svg" alt="">
        </div>
      </div>
    </div>
  </section>

  <section>
    <img src="./img/portfolio_1.png" alt="">
  </section>

  <script>
    const hamburger = document.querySelector(".btn-menu"); // Button menu
    const navMenu = document.querySelector(".nav"); // Navigation

    hamburger.addEventListener("click", mobileMenu);

    function mobileMenu() {
      hamburger.classList.toggle("is-active");
      navMenu.classList.toggle("is-open");
    }
  </script>
</body>

</html>
